    <div class="card">
    	{% if post.photo %}
        <img class="card-img-top" src="{{ site.url }}/photos/100-kb/{{ post.photo }}_100kb.jpg" alt="{{ post.photo }}">
      {% endif %}
      <div class="card-body">
        <h2 class="card-title">{{ post.title }}</h2>
        <p class="card-text">{{ post.excerpt }}</p>
        <a href="{{ post.url }}" class="btn btn-primary stretched-link">...</a>
      </div>
    </div>
