---
title: Photography
bg_theme: bg-dark
---
<div class="card-columns">
{% for image in site.static_files %}
	{% if image.path contains 'photos/100-kb' %}
		<div class="card">
			<img class="card-img-top" src="{{site.baseurl}}{{image.path}}" alt ="{{image.path}}">
		</div>
	{% endif %}
{% endfor %}
</div>
