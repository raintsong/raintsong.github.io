---
layout: default
---
<h1>{{ page.title }}</h1>
<p>By {{ page.author }}</p>
<p>{{ page.date | date_to_string }}
  {% assign theme = site.themes | where: 'theme', page.theme | first %}
  {% if theme %}
    - <a href="{{ theme.url }}">{{ theme.name }}</a>
  {% endif %}</p>
<a href="/writing/">Back to Latest Posts</a>
<div class="post">
	{{ content }}
</div>
