<!DOCTYPE html>
	<html>
		<head>
			<link rel="shortcut icon" href="{{ "/favicon.ico" | prepend: site.baseurl | prepend: site.url }}" />
			<title>{{ page.title }}</title>
			<!-- link to main stylesheet -->
			<link rel="stylesheet" href="/assets/css/styles.css">
			{% if page.bg_theme == 'light' %}
			<!--how do comments work-->
			<link rel="stylesheet" href="/assets/css/styles_light.css">
			{% elsif page.bg_theme == 'dark' %}
			<link rel="stylesheet" href="/assets/css/styles_dark.css">
			{% endif %}

			<link rel="shortcut icon" href="">
			<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
			<script>
				console.log("Hello World!");

				$(document).ready(function() {
					console.log("Document ready!");
					var activeSite = "{{page.url}}";
					console.log(activeSite);
					var bgtheme = "{{page.bg_theme}}";
					var navItems = $("nav a");

					// Set background image to as designated in the Liquid front matter.
					// Logic: if the site is NOT in /writing or /photos, then set a background photo
					// Otherwise, the background color will be set depending on the Liquid above in the stylesheet links

					if (activeSite.indexOf("writing") == -1 && activeSite.indexOf("photos")==-1) {
						$("body").css({"background": "url({{ site.url }}/photos/quarter-size/{{page.bg_image}}_quarter.jpg) no-repeat center center fixed", "-webkit-background-size": "cover", "-moz-background-size": "cover", "-o-background-size": "cover", "background-size": "cover"});
					}




					// Expose or cover background image
					var fullFaded = 0.3;
					var partialFaded = 0.7;
					var fadeTime = 200;
					if (bgtheme == "") {
						var isFaded = false;
						$("nav .container").addClass("faded");

						// The first section is for when you click the text; set isFaded and then restore to full opacity if needed
						$(".container").click(function(){
							// $(this).siblings("p", "h2").toggle("fast");
							// $("#hide").toggle();
							// $("#show").toggle();
							$(".body-darkener").fadeToggle();
							$(".image-desc").fadeToggle(fadeTime);
							isFaded = !isFaded;
							if (isFaded == false) {
								$("nav, .container").animate({opacity: 1.0}, fadeTime);
								console.log($("nav").css("opacity"), 1.0);
							}
						});
						// The second section is for when you click .body-darkener; set isFaded and then fade the nav and container
						$(".body-darkener").click(function(){
							// $(this).siblings("p", "h2").toggle("fast");
							// $("#hide").toggle();
							// $("#show").toggle();
							$(".body-darkener").fadeToggle();
							$(".image-desc").fadeToggle(fadeTime);
							isFaded = !isFaded;
							if (isFaded == true) {
								$("nav, .container").animate({opacity: fullFaded}, fadeTime);
							}
						});
						// The third section is for the hover effect.
						$("nav, .container").hover(function() {
							if (isFaded == true) {
								$("nav, .container").animate({opacity: 1}, fadeTime);
								console.log("unfaded!");
							}
							}, function() {
							if (isFaded == true) {
								$("nav, .container").animate({opacity: fullFaded}, fadeTime);
								console.log("faded again.");
							}
						});
						// This is if I want the .image-desc to have the fading feature. Makes people more likely to hover I think
						$(".image-desc").hover(function() {
							// $(this).animate({opacity: 1}, fadeTime);
							$("nav, .container, .nav-logo").fadeToggle();
						}, function() {
							// $(this).animate({opacity: partialFaded}, fadeTime);
							$("nav, .container, .nav-logo").fadeToggle();
						})							
					}
				

					// This section of the script is for turning the listing li into links.

					var postInIndex = $(".listing li");
					postInIndex.hover(function() {
						window.status = $(this).find("a:first").attr("href");
						$(this).find("a:first").addClass("underlined");
				    }, function () {
				        window.status = "";
						$(this).find("a:first").removeClass("underlined");


				    });
					postInIndex.click(function() {
				        window.location = $(this).find("a:first").attr("href");
				        return false;
					});
				});


				// I was testing dynamically loading the logo but I gave up
				// var windowSize = window.innerWidth;
				// var navLogoImg = $(".nav-logo img");
				// if(windowSize >= 640){
				// 	navLogoImg.attr("src","../assets/images/website-logo-rd1-01.png")
				// 	console.log("part one!");
				// }
				// if (windowSize <= 640 && windowSize >= 360) {
				// 	$(".nav-logo img").attr("src","../assets/images/website-logo-rd1-01-rotate.png");
				// 	console.log("option two!");
				// }
				// if(windowSize < 360){
				// 	navLogoImg.attr("src","../assets/images/website-logo-rd1-01-rotate.png")
				// }
				// console.log(windowSize);
				// console.log(navLogoImg.attr("src"));




				// Test script for "current" class

				// navItems.each(function() {
				// 	console.log($(this).hasClass("current"));
				// 	if ($(this).hasClass("current") == false) {
				// 	}
				// });



			</script>


			<!-- links to fonts below-->
			<link href="https://fonts.googleapis.com/css?family=Lato&display=swap" rel="stylesheet">
			<link href="https://fonts.googleapis.com/css?family=Open+Sans|PT+Serif&display=swap" rel="stylesheet">
		</head>
		<body>
			<div class="body-darkener">
			</div>
			<div class="body-container">
				<header>
					{% include navigation.html %}
				</header>
				<div class="container">

				{{ content }}

				</div><!-- /.container -->

				{% if page.bg_image %}
				<div class="image-desc">
					<h3>{{page.bg_image_desc}}</h3>
					<h3>By {{page.bg_image_attr}}</h3>
				</div>
				{% endif %}
			</div>
		</body>
	</html>
