name: Rain Tsong, educator, artist, researcher
markdown: kramdown

collections:
  themes:
    output: true
    permalink: /writing/themes/:name
defaults:
  - scope:
      path: ""
      type: "themes"
    values: 
      layout: "theme"
      bg_theme: "light"
  - scope:
      path: ""
      type: "posts"
    values: 
      layout: "post"
      bg_theme: "light"
  - scope:
      path: ""
    values: 
      layout: "default"

permalink: /writing/:year/:month/:day/:title
